name: "API Surface Check"

# Trigger workflow. Does not run the analysis itself — only writes a single
# true/false verdict signalling whether the api-surface-comment workflow needs
# to run. All real work happens there from trusted code via the published
# composer/api-surface-check action.

on:
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'tests/**'

permissions:
  contents: read

concurrency:
  group: api-surface-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preflight:
    name: "Preflight"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Preflight scan"
        uses: composer/api-surface-check/preflight@5c0453ffc6042d3f0ac544c21893beeb649f39b7 # 0.1.0
        with:
          base-ref: origin/${{ github.event.pull_request.base.ref }}

      - name: "Upload preflight verdict"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-surface-preflight
          path: api-surface-preflight/
          retention-days: 1
