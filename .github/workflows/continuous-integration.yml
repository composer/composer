name: "Continuous Integration"

on:
  push:
    paths-ignore:
      - 'doc/**'
  pull_request:
    paths-ignore:
      - 'doc/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMPOSER_FLAGS: "--ansi --no-interaction --no-progress --no-suggest --prefer-dist"

jobs:
  tests:
    name: "CI"

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        php-version:
          - "5.3"
          - "5.4"
          - "5.5"
          - "5.6"
          - "7.0"
          - "7.1"
          - "7.2"
          - "7.3"
          - "7.4"
        dependencies: [locked]
        os: [ubuntu-latest]
        experimental: [false]
        include:
          - php-version: 5.3
            dependencies: highest
            os: ubuntu-latest
            experimental: false
          - php-version: 7.4
            os: windows-latest
            dependencies: locked
            experimental: false
          - php-version: 7.4
            os: macos-latest
            dependencies: locked
            experimental: false

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install PHP"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: "none"
          extensions: "intl"
          ini-values: "memory_limit=-1"
          php-version: "${{ matrix.php-version }}"

      - name: "Determine composer cache directory"
        id: "determine-composer-cache-directory"
        run: "echo \"::set-output name=directory::$(composer config cache-dir)\""

      - name: "Cache dependencies installed with composer"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "${{ steps.determine-composer-cache-directory.outputs.directory }}"
          key: "php-${{ matrix.php-version }}-symfony-php-unit-version-${{ env.SYMFONY_PHPUNIT_VERSION }}-${{ hashFiles('**/composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-symfony-php-unit-version-${{ env.SYMFONY_PHPUNIT_VERSION }}"

      - name: "Install highest dependencies from composer.json using composer binary provided by system"
        if: "matrix.dependencies == 'highest'"
        run: 'composer config platform --unset && composer update $COMPOSER_FLAGS'

      - name: "Install lowest dependencies from composer.json using composer binary provided by system"
        if: "matrix.dependencies == 'lowest'"
        run: 'composer update $COMPOSER_FLAGS --prefer-lowest'

      - name: "Install dependencies from composer.lock using composer binary provided by system"
        if: "matrix.dependencies == 'locked'"
        run: 'composer install $COMPOSER_FLAGS'

      - name: "Run install again using composer binary from source"
        run: 'bin/composer install $COMPOSER_FLAGS'

      - name: "Validate composer.json"
        run: "bin/composer validate"

      - name: "Prepare git environment"
        run: "git config --global user.name composer && git config --global user.email composer@example.com"

      - name: "Set SYMFONY_PHPUNIT_VERSION environment variable"
        if: "matrix.php-version == '7.4'"
        run: "echo \"SYMFONY_PHPUNIT_VERSION=7.5\" >> $GITHUB_ENV"

      - name: "Run tests"
        run: "vendor/bin/simple-phpunit"
